<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Relatório de Consulta — ERG</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/admin.css">
  <link rel="stylesheet" href="css/theme-nutri.css">
  <link rel="icon" type="image/png" href="favicon.png">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body id="admin-root">

  <header class="mobile-header">
    <span class="mobile-brand">Relatório de Consulta</span>
    <button class="hamburger" id="hamburger-btn"><span></span><span></span><span></span></button>
  </header>
  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <div class="dashboard-layout">
    <nav class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <img src="icons/logo-80.png" alt="ERG" class="sidebar-logo">
        <p class="sidebar-brand-name">ERG</p>
        <p class="sidebar-brand-specialty">Relatório</p>
      </div>

      <div class="sidebar-nav">
        <p class="nav-section-label">Ações</p>
        <a class="nav-item" id="btn-imprimir" href="javascript:void(0)">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/>
            <rect x="6" y="14" width="12" height="8"/>
          </svg>
          Imprimir / PDF
        </a>
        <a class="nav-item" id="btn-ver-checkins" href="#">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
          </svg>
          Ver Check-ins
        </a>
      </div>

      <div class="sidebar-footer">
        <div class="sidebar-user">
          <p class="sidebar-user-name" id="rel-nome-sidebar">—</p>
          <p class="sidebar-user-label">Paciente</p>
        </div>
        <button class="logout-btn" onclick="window.location.href='admin.html'">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="15 18 9 12 15 6"/></svg>
          Voltar
        </button>
      </div>
    </nav>

    <main class="main-content">
      <div id="rel-mount">
        <!-- Loading state -->
        <div class="page-header fade-up">
          <p class="page-greeting">Gerando relatório...</p>
          <h1 class="page-title">Relatório de Consulta</h1>
          <p class="page-date">Coletando e analisando dados do paciente</p>
        </div>
      </div>

      <div class="admin-back-bottom">
        <a href="admin.html" class="back-link">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="15 18 9 12 15 6"/></svg>
          Voltar ao painel
        </a>
      </div>
    </main>
  </div>

  <!-- ══ ESTILOS DO RELATÓRIO ══════════════════════════════ -->
  <style>

    /* Layout principal */
    .rel-container {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    /* ── Capa ── */
    .rel-capa {
      padding: 32px 0 28px;
      border-bottom: 2px solid var(--detail);
      margin-bottom: 28px;
    }
    .rel-capa-meta {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }
    .rel-label-sup {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.6rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--subtitle);
    }
    .rel-semaforo {
      padding: 4px 14px;
      border-radius: 2px;
    }
    .rel-nome {
      font-family: 'DM Serif Display', serif;
      font-size: 2rem;
      color: var(--text);
      margin: 0 0 12px;
      font-weight: 400;
      line-height: 1.1;
    }
    .rel-capa-sub {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
    }
    .rel-capa-sub span {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.74rem;
      color: var(--sub);
    }

    /* ── Grid 2 colunas ── */
    .rel-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }
    @media (max-width: 820px) {
      .rel-grid { grid-template-columns: 1fr; }
    }
    .rel-col-left,
    .rel-col-right {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* ── Cards ── */
    .rel-card {
      background: var(--bg-primary);
      border: 1px solid var(--detail);
      padding: 20px;
    }
    .rel-card-title {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.6rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--subtitle);
      margin: 0 0 14px;
    }
    .rel-empty {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.76rem;
      color: var(--sub);
      margin: 0;
      font-style: italic;
    }

    /* ── Key-value ── */
    .rel-kv {
      display: flex;
      gap: 12px;
      align-items: baseline;
      margin-bottom: 8px;
    }
    .rel-kv:last-child { margin-bottom: 0; }
    .rel-k {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.65rem;
      color: var(--subtitle);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      flex-shrink: 0;
      min-width: 100px;
    }
    .rel-v {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.78rem;
      color: var(--text);
      line-height: 1.5;
    }

    /* ── Badges de módulo ── */
    .rel-badge {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.65rem;
      color: var(--sub);
      background: var(--bg2);
      border: 1px solid var(--detail);
      padding: 3px 10px;
      border-radius: 2px;
    }

    /* ── Grid de peso ── */
    .rel-peso-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
      gap: 10px;
      margin-bottom: 12px;
    }
    .rel-peso-card {
      background: var(--bg2);
      border: 1px solid var(--detail);
      padding: 10px 12px;
      text-align: center;
    }
    .rel-peso-val {
      font-family: 'DM Serif Display', serif;
      font-size: 1.25rem;
      color: var(--text);
      margin: 0 0 3px;
      font-weight: 400;
      line-height: 1;
    }
    .rel-peso-val span {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.65rem;
      color: var(--sub);
    }
    .rel-peso-label {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.6rem;
      color: var(--sub);
      margin: 0;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    /* ── Barras de componente ── */
    .rel-comp-row {
      display: grid;
      grid-template-columns: 80px 1fr 42px;
      gap: 8px;
      align-items: center;
      margin-bottom: 7px;
    }
    .rel-comp-label {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.68rem;
      color: var(--sub);
    }
    .rel-comp-bar-bg {
      height: 5px;
      background: var(--bg2);
      border-radius: 3px;
      overflow: hidden;
    }
    .rel-comp-bar-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.6s ease;
    }
    .rel-comp-val {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.68rem;
      color: var(--text);
      text-align: right;
    }

    /* ── Tendência score ── */
    .rel-tend-melhorando { color: #2E8B6A; font-weight: 600; }
    .rel-tend-piorando   { color: #B33030; font-weight: 600; }
    .rel-tend-estagnado  { color: #B8860B; font-weight: 600; }

    /* ── Seções largas ── */
    .rel-section-wide {
      margin-bottom: 20px;
    }
    .rel-section-title {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.6rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--subtitle);
      margin: 0 0 14px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--detail);
    }

    /* ── Grid de sugestões ── */
    .rel-sug-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 14px;
    }
    .rel-sug-card {
      background: var(--bg2);
      border: 1px solid var(--detail);
      padding: 16px;
    }

    /* ── Agenda de consulta ── */
    .rel-agenda-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 0;
      border: 1px solid var(--detail);
    }
    .rel-agenda-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--detail);
      border-right: 1px solid var(--detail);
    }
    .rel-agenda-item:last-child {
      border-bottom: none;
    }

    /* ══ PRINT ════════════════════════════════════════════ */
    @media print {
      #sidebar, .mobile-header, .sidebar-overlay,
      .admin-back-bottom, #hamburger-btn { display: none !important; }
      .dashboard-layout { display: block !important; }
      .main-content { padding: 0 !important; margin: 0 !important; }
      .rel-capa { padding-top: 0 !important; }
      .rel-grid { grid-template-columns: 1fr 1fr !important; }
      .rel-sug-grid { grid-template-columns: 1fr 1fr 1fr !important; }
      .rel-agenda-grid { grid-template-columns: 1fr 1fr !important; }
      .fade-up { opacity: 1 !important; transform: none !important; }
      body { background: white !important; }
    }

    /* ── Mobile ── */
    @media (max-width: 600px) {
      .rel-nome { font-size: 1.5rem; }
      .rel-sug-grid { grid-template-columns: 1fr; }
      .rel-agenda-grid { grid-template-columns: 1fr; }
      .rel-comp-row { grid-template-columns: 70px 1fr 36px; }
    }
  </style>

  <!-- Sidebar mobile init -->
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const btn = document.getElementById('hamburger-btn');
      const overlay = document.getElementById('sidebar-overlay');
      const sidebar = document.getElementById('sidebar');
      if (btn && overlay && sidebar) {
        btn.addEventListener('click', () => {
          sidebar.classList.toggle('open');
          overlay.classList.toggle('active');
        });
        overlay.addEventListener('click', () => {
          sidebar.classList.remove('open');
          overlay.classList.remove('active');
        });
      }
    });
  </script>

  <script type="module" src="js/relatorio-consulta.js"></script>
</body>
</html>
